services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: local
      APP_NAME: TravelAssistant
      API_BASE_URL: http://localhost:8000
      PUBLIC_APP_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      JWT_SECRET_KEY: docker-local-secret-change-me
      DATABASE_URL: postgresql+psycopg://travelassistant:travelassistant@postgres:5432/travelassistant
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEFAULT_LLM_PROVIDER: openai
      LLM_MODEL: gpt-4.1-nano
      DEFAULT_STT_PROVIDER: openai
      DEFAULT_TTS_PROVIDER: openai
      STT_MODEL: whisper-1
      TTS_MODEL: tts-1
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: "1536"
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: travelassistant_chunks
      OBJECT_STORAGE_PROVIDER: local
      R2_PUBLIC_BASE_URL: http://localhost:8000/uploads
    command: >
      sh -c "alembic -c apps/api/alembic.ini upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ../../data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: local
      APP_NAME: TravelAssistant
      JWT_SECRET_KEY: docker-local-secret-change-me
      DATABASE_URL: postgresql+psycopg://travelassistant:travelassistant@postgres:5432/travelassistant
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEFAULT_LLM_PROVIDER: openai
      LLM_MODEL: gpt-4.1-nano
      DEFAULT_STT_PROVIDER: openai
      DEFAULT_TTS_PROVIDER: openai
      STT_MODEL: whisper-1
      TTS_MODEL: tts-1
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: "1536"
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: travelassistant_chunks
      OBJECT_STORAGE_PROVIDER: local
      R2_PUBLIC_BASE_URL: http://localhost:8000/uploads
    command: rq worker ingestion --url redis://redis:6379/0
    volumes:
      - ../../data/uploads:/app/data/uploads
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: travelassistant
      POSTGRES_USER: travelassistant
      POSTGRES_PASSWORD: travelassistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelassistant -d travelassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
